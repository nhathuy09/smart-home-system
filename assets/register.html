<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Smart Home</title>
    <link href="/assets/css/reset.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/assets/css/login.css" rel="stylesheet" />
    <style>
        /* Override cho trang Đăng Ký: dùng màu xanh dương thay xanh lá */
        .logo-circle { color: #3B82F6; }
        .input-group input:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .btn-login {
            background: #3B82F6;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
            margin-top: 2rem;
        }
        .btn-login:hover {
            background: #2563EB;
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }
        .register-link a:hover { color: #3B82F6; }
        .success-msg {
            color: #10B981;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-weight: 600;
            display: none;
            background: #ECFDF5;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #A7F3D0;
        }
        /* Highlight riêng cho ô nhập Mã gia đình */
        .family-code-group {
            border: 2px dashed #3B82F6 !important;
            background: #EFF6FF !important;
        }
        .family-code-group i { color: #3B82F6 !important; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-content">
                <div class="logo-circle">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                
                <h1>Tạo tài khoản mới</h1>
                <p class="subtitle">Đăng ký để điều khiển nhà thông minh</p>

                <div class="error-msg" id="errorMsg">Mật khẩu xác nhận không khớp.</div>
                <div class="success-msg" id="successMsg"><i class="fa-solid fa-circle-check"></i> Đăng ký thành công! Đang chuyển hướng...</div>

                <form id="registerForm">
                    <div class="input-group">
                        <i class="fa-solid fa-address-card"></i>
                        <input type="text" id="full_name" placeholder="Họ và Tên" required autocomplete="name">
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email liên hệ" required autocomplete="email">
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="username">
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="new-password">
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirm_password" placeholder="Xác nhận mật khẩu" required autocomplete="new-password">
                    </div>

                    <div class="input-group family-code-group">
                        <i class="fa-solid fa-house-lock"></i>
                        <input type="text" id="family_code" placeholder="Mã Gia Đình (Family Code)" required>
                    </div>

                    <button type="submit" class="btn-login" id="registerBtn">
                        <span id="btnText">Đăng Ký</span>
                        <div class="spinner" id="btnSpinner"></div>
                    </button>
                    
                </form>

                <p class="register-link">Đã có tài khoản? <a href="index.html">Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('registerBtn');
            const text = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            // Hide messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // Lấy dữ liệu
            const fullName = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            const familyCode = document.getElementById('family_code').value.trim();

            // Validate match
            if (pass !== confirmPass) {
                errorMsg.innerText = "Mật khẩu xác nhận không khớp.";
                errorMsg.style.display = 'block';
                return;
            }

            // Simulate loading state
            text.style.display = 'none';
            spinner.style.display = 'block';
            btn.style.pointerEvents = 'none';

            // GỌI API THẬT LÊN FASTAPI
            try {
                const response = await fetch("https://smarthome.vonhathuy.id.vn/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        full_name: fullName,
                        email: email,
                        username: user,
                        password: pass,
                        family_code: familyCode
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Show success
                    document.getElementById('registerForm').style.display = 'none';
                    successMsg.innerHTML = '<i class="fa-solid fa-circle-check"></i> Đăng ký thành công! Đang mở Camera...';
                    successMsg.style.display = 'block';
                    spinner.style.display = 'none';

                    // Lưu username lại để trang register-face.html lấy được gửi ảnh lên
                    localStorage.setItem('temp_reg_username', user);

                    // Chuyển hướng sang trang quét khuôn mặt thay vì trang đăng nhập
                    setTimeout(() => {
                        window.location.href = 'register-face.html';
                    }, 1500);
                } else {
                    // Nếu lỗi (Sai mã gia đình, trùng user...)
                    throw new Error(data.detail || "Đăng ký thất bại");
                }
            } catch (error) {
                text.style.display = 'block';
                spinner.style.display = 'none';
                btn.style.pointerEvents = 'auto';
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
