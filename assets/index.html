<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Smart Home</title>
    <link href="/assets/css/reset.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/assets/css/login.css" rel="stylesheet" />
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-content">
                <div class="logo-circle">
                    <i class="fa-solid fa-house-signal"></i>
                </div>
                <h1>Chào mừng trở lại!</h1>
                <p class="subtitle">Đăng nhập vào hệ thống Smart Home</p>
                <div class="error-msg" id="errorMsg">Tên đăng nhập hoặc mật khẩu không đúng.</div>

                <form id="loginForm">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="username">
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
                    </div>

                    <div class="options">
                        <label>
                            <input type="checkbox" id="remember"> Ghi nhớ
                        </label>
                        <a href="#">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span id="btnText">Đăng Nhập</span>
                        <div class="spinner" id="btnSpinner"></div>
                    </button>
                    
                    <button type="button" class="btn-faceid" onclick="window.location.href='face-login.html'">
                        <i class="fa-solid fa-face-smile"></i> Đăng nhập bằng Khuôn mặt
                    </button>
                </form>

                <p class="register-link">Bạn chưa có tài khoản? <a href="/assets/register.html">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const errorMsg = document.getElementById('errorMsg');
            
            // Ẩn lỗi cũ
            errorMsg.style.display = 'none';
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            // Hiển thị trạng thái đang tải
            text.style.display = 'none';
            spinner.style.display = 'block';
            btn.style.pointerEvents = 'none';

            try {
                // Gọi API Đăng nhập thật lên FastAPI
                const response = await fetch("https://smarthome.vonhathuy.id.vn/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: user,
                        password: pass
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Đăng nhập thành công -> Lưu thông tin vào localStorage để các trang khác biết
                    localStorage.setItem('isAuthenticated', 'true');
                    localStorage.setItem('username', data.full_name || user);
                    localStorage.setItem('family_id', data.family_id); // Cực kỳ quan trọng để bảo mật
                    
                    // Chuyển hướng vào trang điều khiển nhà
                    window.location.href = '/assets/home.html';
                } else {
                    // Lỗi: Sai pass hoặc sai user
                    throw new Error(data.detail || "Tên đăng nhập hoặc mật khẩu không đúng.");
                }
            } catch (error) {
                // Phục hồi lại nút bấm và báo lỗi
                text.style.display = 'block';
                spinner.style.display = 'none';
                btn.style.pointerEvents = 'auto';
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
